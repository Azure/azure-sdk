name: "Auto-close on Approval"

on:
  issues:
    types: [labeled]

jobs:
  check-approval:
    if: contains(github.event.issue.labels.*.name, 'board-review')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout workflow dependencies
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/api-review-approvers.yml
            .github/package.json
            .github/package-lock.json
            .github/workflows/src/comment.js
            .github/workflows/src/labels.js
            .github/workflows/src/arch-board-review
          sparse-checkout-cone-mode: false

      - name: Install dependencies
        run: cd .github && npm ci

      - name: Check if all approvals are present
        uses: actions/github-script@v7
        with:
          script: |
            const { default: checkApproval } = await import('${{ github.workspace }}/.github/workflows/src/arch-board-review/approval-check.js');
            await checkApproval({ github, context, core });
