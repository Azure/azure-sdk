name: "Arch Board Review Triage"

on:
  issues:
    types: [opened, edited]

jobs:
  triage:
    # Only run on issues created from the arch-board-review template
    if: contains(github.event.issue.labels.*.name, 'board-review') && !contains(github.event.issue.labels.*.name, 'namespace-review')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Parse and validate review request
        uses: actions/github-script@v7
        with:
          script: |
            const issueBody = context.payload.issue.body || '';
            const issueNumber = context.payload.issue.number;

            // ── Helper: validate a URL is reachable ─────────────────
            // Domains that require auth — validate URL format with review ID.
            // Level 2 (future): use APIView API token to call
            //   GET /api/reviews/resolve?link={url} to verify review exists
            //   GET /api/reviews/metadata?revisionId={id} to check revision/approval
            const trustedDomains = ['apiview.dev'];

            async function isUrlReachable(url) {
              try {
                const parsed = new URL(url);
                if (trustedDomains.some(d => parsed.hostname === d || parsed.hostname.endsWith('.' + d))) {
                  // Validate the URL has a review ID pattern
                  if (parsed.hostname.includes('apiview.dev')) {
                    const hasReviewId = /\/Review\/[a-f0-9]+/i.test(parsed.pathname)
                      || /\/review\/[a-f0-9-]+/i.test(parsed.pathname)
                      || parsed.searchParams.has('activeApiRevisionId')
                      || parsed.searchParams.has('revisionId');
                    if (!hasReviewId) {
                      return false;
                    }
                  }
                  return true;
                }
              } catch {
                return false;
              }
              try {
                const response = await fetch(url, {
                  method: 'HEAD',
                  redirect: 'follow',
                  signal: AbortSignal.timeout(10000),
                });
                return response.ok || response.status === 405;
              } catch {
                try {
                  const response = await fetch(url, {
                    method: 'GET',
                    redirect: 'follow',
                    signal: AbortSignal.timeout(10000),
                  });
                  return response.ok;
                } catch {
                  return false;
                }
              }
            }

            // ── Helper: extract URL from a form section ─────────────
            function extractUrl(body, headerText) {
              const section = body.split(headerText)[1];
              if (!section) return null;
              const content = section.split('###')[0];
              const match = content.match(/https?:\/\/[^\s)]+/);
              return match ? match[0] : null;
            }

            // ── Language detection ──────────────────────────────────
            const languageMap = {
              '.NET':           { label: '.NET',       id: 'dotnet' },
              'Java':           { label: 'Java',       id: 'java' },
              'Python':         { label: 'Python',     id: 'python' },
              'TypeScript':     { label: 'TypeScript', id: 'typescript' },
              'Go':             { label: 'Go',         id: 'go' },
              'C':              { label: 'C',          id: 'c' },
              'C++':            { label: 'C++',        id: 'cpp' },
              'Android':        { label: 'Android',    id: 'android' },
              'iOS / Swift':    { label: 'iOS',        id: 'ios' },
            };

            const selectedLanguages = [];
            for (const [formLabel, meta] of Object.entries(languageMap)) {
              const escapedLabel = formLabel.replace(/[.*+?^${}()|[\]\\\/]/g, '\\$&');
              const regex = new RegExp(`-\\s*\\[\\s*[Xx]\\s*\\]\\s*${escapedLabel}\\s*$`, 'm');
              if (regex.test(issueBody)) {
                selectedLanguages.push(meta);
              }
            }

            console.log(`Selected languages: ${selectedLanguages.map(l => l.label).join(', ') || 'none'}`);

            // ── Apply language labels ───────────────────────────────
            const labelsToAdd = selectedLanguages.map(l => l.label);
            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: labelsToAdd,
              });
            }

            // ── Validate artifacts per selected language ────────────
            const missing = [];
            const validated = [];
            const tier1Languages = ['dotnet', 'java', 'python', 'typescript', 'go'];

            for (const lang of selectedLanguages) {
              if (!tier1Languages.includes(lang.id)) continue;
              const langMissing = [];
              const langValid = [];

              // --- APIView link: extract and validate URL ---
              const apiviewUrl = extractUrl(issueBody, `### ${lang.label} — APIView Link`);
              if (!apiviewUrl) {
                langMissing.push('APIView link not provided');
              } else {
                const reachable = await isUrlReachable(apiviewUrl);
                if (!reachable) {
                  langMissing.push(`APIView link is not reachable: ${apiviewUrl}`);
                } else {
                  langValid.push(`APIView link verified: ${apiviewUrl}`);
                }
              }

              // --- Verification checklist (self-reported) ---
              const checklistChecks = [
                { text: 'A diff revision is selected in the APIView review', name: 'Diff revision selected' },
                { text: 'CI checks are passing on the PR', name: 'CI passing' },
              ];

              for (const check of checklistChecks) {
                const escaped = check.text.replace(/[.*+?^${}()|[\]\\\/]/g, '\\$&');
                const checkRegex = new RegExp(`-\\s*\\[\\s*[Xx]\\s*\\]\\s*${escaped}`);
                if (!checkRegex.test(issueBody)) {
                  langMissing.push(`${check.name} (not confirmed)`);
                }
              }

              // --- Samples link: extract and validate URL or "Uploaded in APIView" ---
              const samplesHeader = `### ${lang.label} — Champion Scenarios / Quickstart Samples`;
              const samplesSection = issueBody.split(samplesHeader)[1];
              const samplesContent = samplesSection ? samplesSection.split('###')[0].trim() : '';
              if (!samplesContent || samplesContent === '_No response_') {
                langMissing.push('Champion Scenarios / Samples not provided');
              } else if (!/uploaded\s+in\s+apiview/i.test(samplesContent)) {
                const samplesUrl = samplesContent.match(/https?:\/\/[^\s)]+/);
                if (samplesUrl) {
                  const reachable = await isUrlReachable(samplesUrl[0]);
                  if (!reachable) {
                    langMissing.push(`Samples link is not reachable: ${samplesUrl[0]}`);
                  } else {
                    langValid.push(`Samples link verified: ${samplesUrl[0]}`);
                  }
                }
              } else {
                langValid.push('Samples uploaded in APIView (self-reported)');
              }

              // --- PR link: extract and validate URL ---
              const prUrl = extractUrl(issueBody, `### ${lang.label} — PR Link`);
              if (!prUrl) {
                langMissing.push('PR link not provided');
              } else {
                const reachable = await isUrlReachable(prUrl);
                if (!reachable) {
                  langMissing.push(`PR link is not reachable: ${prUrl}`);
                } else {
                  langValid.push(`PR link verified: ${prUrl}`);
                }
              }

              // --- README link: extract and validate URL ---
              const readmeUrl = extractUrl(issueBody, `### ${lang.label} — README Link`);
              if (!readmeUrl) {
                langMissing.push('README link not provided');
              } else {
                const reachable = await isUrlReachable(readmeUrl);
                if (!reachable) {
                  langMissing.push(`README link is not reachable: ${readmeUrl}`);
                } else {
                  langValid.push(`README link verified: ${readmeUrl}`);
                }
              }

              if (langMissing.length > 0) {
                missing.push({ language: lang.label, items: langMissing });
              }
              if (langValid.length > 0) {
                validated.push({ language: lang.label, items: langValid });
              }
            }

            // ── Apply status labels and comment ─────────────────────
            const currentLabels = context.payload.issue.labels.map(l => l.name);

            if (missing.length === 0 && selectedLanguages.length > 0) {
              // All checks pass
              if (!currentLabels.includes('ready-for-review')) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  labels: ['ready-for-review'],
                });
              }

              if (currentLabels.includes('needs-info')) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    name: 'needs-info',
                  });
                } catch (e) { /* label may not exist */ }
              }

              let body = `✅ **All materials verified for ${selectedLanguages.map(l => l.label).join(', ')}.**\n\nThis review request is ready for architects. The \`ready-for-review\` label has been applied.\n\n`;
              body += `<details><summary>Validation details</summary>\n\n`;
              for (const v of validated) {
                body += `**${v.language}:**\n`;
                for (const item of v.items) {
                  body += `- ✅ ${item}\n`;
                }
                body += '\n';
              }
              body += `</details>`;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: body.trim(),
              });

            } else if (missing.length > 0) {
              // Some checks failed
              if (!currentLabels.includes('needs-info')) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  labels: ['needs-info'],
                });
              }

              if (currentLabels.includes('ready-for-review')) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    name: 'ready-for-review',
                  });
                } catch (e) { /* label may not exist */ }
              }

              let body = `⚠️ **Some required materials are missing or invalid.** Please update the issue and the automation will re-check.\n\n`;
              for (const m of missing) {
                body += `**${m.language}:**\n`;
                for (const item of m.items) {
                  body += `- ❌ ${item}\n`;
                }
                body += '\n';
              }

              if (validated.length > 0) {
                body += `<details><summary>Items that passed validation</summary>\n\n`;
                for (const v of validated) {
                  body += `**${v.language}:**\n`;
                  for (const item of v.items) {
                    body += `- ✅ ${item}\n`;
                  }
                  body += '\n';
                }
                body += `</details>`;
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: body.trim(),
              });

            } else {
              // No languages selected
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: ['needs-info'],
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `⚠️ **No languages were selected.** Please edit the issue and check at least one language under "Languages for this Review".`,
              });
            }
