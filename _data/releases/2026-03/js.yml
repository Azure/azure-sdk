- Name: '@azure-rest/confidential-ledger'
  Version: 1.1.2-beta.4
  DisplayName: Confidential Ledger
  ServiceName: Confidential Ledger
  VersionType: Beta
  Hidden: false
  ChangelogUrl: https://github.com/Azure/azure-sdk-for-js/tree/@azure-rest/confidential-ledger_1.1.2-beta.4/sdk/confidentialledger/confidential-ledger-rest/CHANGELOG.md
  ChangelogContent: |-
    #### Bugs Fixed

    - Fixed redirect handling to preserve the `Authorization` header when Confidential Ledger redirects write operations from a secondary node to the primary node (307 redirect). Previously, the default redirect policy stripped the `Authorization` header, causing 401 Unauthorized errors.
- Name: '@azure/monitor-opentelemetry-exporter'
  Version: 1.0.0-beta.39
  DisplayName: OpenTelemetry Exporter
  ServiceName: Monitor
  VersionType: Beta
  Hidden: false
  ChangelogUrl: https://github.com/Azure/azure-sdk-for-js/tree/@azure/monitor-opentelemetry-exporter_1.0.0-beta.39/sdk/monitor/monitor-opentelemetry-exporter/CHANGELOG.md
  ChangelogContent: |-
