- Name: '@azure/monitor-opentelemetry-exporter'
  Version: 1.0.0-beta.41
  DisplayName: OpenTelemetry Exporter
  ServiceName: Monitor
  VersionType: Beta
  Hidden: false
  ChangelogUrl: https://github.com/Azure/azure-sdk-for-js/tree/@azure/monitor-opentelemetry-exporter_1.0.0-beta.41/sdk/monitor/monitor-opentelemetry-exporter/CHANGELOG.md
  ChangelogContent: |-
    #### Bugs Fixed

    - Fixed a `TypeError: Cannot use 'in' operator to search for 'measurements'` crash that occurred when a log record's `body` was a non-object value (such as a string) on the custom event / legacy Application Insights export path.

