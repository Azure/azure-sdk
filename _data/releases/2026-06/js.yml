entries:
- Name: '@azure/storage-blob'
  Version: 12.33.0-beta.1
  DisplayName: Storage - Blobs
  ServiceName: Storage
  VersionType: Beta
  Hidden: false
  ChangelogUrl: https://github.com/Azure/azure-sdk-for-js/tree/@azure/storage-blob_12.33.0-beta.1/sdk/storage/storage-blob/CHANGELOG.md
  ChangelogContent: |-
    #### Features Added

    - Added support for service version 2026-06-06.
    - Added support for Blob Smart Tier.
    - Added support for Directory-level SAS and User Delegation SAS.
- Name: '@azure/storage-file-share'
  Version: 12.32.0-beta.1
  DisplayName: Storage - Files Share
  ServiceName: Storage
  VersionType: Beta
  Hidden: false
  ChangelogUrl: https://github.com/Azure/azure-sdk-for-js/tree/@azure/storage-file-share_12.32.0-beta.1/sdk/storage/storage-file-share/CHANGELOG.md
  ChangelogContent: |-
    #### Features Added

    - Added support for service version 2026-06-06.
    - Added support for uploading up to 4 MiB of data with shareFileClient.create().
- Name: '@azure/storage-file-datalake'
  Version: 12.31.0-beta.1
  DisplayName: Storage - Files Data Lake
  ServiceName: Storage
  VersionType: Beta
  Hidden: false
  ChangelogUrl: https://github.com/Azure/azure-sdk-for-js/tree/@azure/storage-file-datalake_12.31.0-beta.1/sdk/storage/storage-file-datalake/CHANGELOG.md
  ChangelogContent: |-
    #### Features Added

    - Added support for service version 2026-06-06.
    - Added DataLakePathClient.getSystemProperties().
    - Added DataLakePathClient.getTags() and .setTags().
