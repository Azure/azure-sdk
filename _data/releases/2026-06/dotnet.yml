entries:
- Name: Azure.Extensions.AspNetCore.DataProtection.Keys
  Version: 1.6.3
  DisplayName: Key Encryptor for .NET Data Protection
  ServiceName: Extensions
  VersionType: Patch
  Hidden: false
  ChangelogUrl: https://github.com/Azure/azure-sdk-for-net/tree/Azure.Extensions.AspNetCore.DataProtection.Keys_1.6.3/sdk/extensions/Azure.Extensions.AspNetCore.DataProtection.Keys/CHANGELOG.md
  ChangelogContent: |-
    #### Bugs Fixed

    - Fixed a misalignment between the explicit `net8.0` target of this package and its `Microsoft.AspNetCore.DataProtection` dependency, which does not offer a `net8.0` asset in the 10.x version. The dependency now resolves to version 8.0.26 when targeting `net8.0`, ensuring consumers receive a framework-compatible asset and eliminating the associated dependency warnings.
