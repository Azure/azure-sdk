- Name: Azure.Core
  Version: 1.58.0
  DisplayName: Core - Client - Core
  ServiceName: Other
  VersionType: GA
  Hidden: false
  ChangelogUrl: https://github.com/Azure/azure-sdk-for-net/tree/Azure.Core_1.58.0/sdk/core/Azure.Core/CHANGELOG.md
  ChangelogContent: |-
    #### Bugs Fixed

    - Fixed `NullReferenceException` thrown by `Operation.RehydrateAsync` / `ArmOperation.RehydrateAsync` (and the resulting operation's `UpdateStatusAsync` / `Value`) when the rehydrated long-running operation has completed with a failure. `OperationState.Failure` and `OperationState<T>.Failure` now honor their documented contract and materialize a default `RequestFailedException` from the raw response when the caller passes `null`, matching the behavior of the non-rehydration polling path.
    - Fixed `DiagnosticScope` to mark the parent `ActivityContext` as remote (`IsRemote = true`) when a traceparent is provided via `SetTraceContext` or `AddLink`. The traceparent in these paths is always extracted from an external source (e.g. a messaging broker's application properties), so samplers that distinguish local vs. remote parents â€” such as the `RateLimitedSampler` used by the Azure Monitor OpenTelemetry exporter â€” can now make correct decisions for activities started from incoming messages.

    #### Features Added

    - Adopt System.ClientModel 1.14.0
- Name: Azure.Core
  Version: 1.57.0
  DisplayName: Core - Client - Core
  ServiceName: Other
  VersionType: GA
  Hidden: false
  ChangelogUrl: https://github.com/Azure/azure-sdk-for-net/tree/Azure.Core_1.57.0/sdk/core/Azure.Core/CHANGELOG.md
  ChangelogContent: |-
    #### Breaking Changes

    - Removed experimental (`SCME0002`) `WithAzureCredential` extension methods on `ClientSettings` and `IClientBuilder`. For DI, use `AddAzureClient<TClient, TSettings>` / `AddKeyedAzureClient<TClient, TSettings>` (which register `AzureCredentialResolver` automatically), or call `AddAzureCredentialResolver()` followed by `AddClient<TClient, TSettings>` / `AddKeyedClient<TClient, TSettings>`. For standalone scenarios, use `IConfiguration.GetAzureClientSettings<T>(...)` or `IConfiguration.GetAzureCredentialSettings(...)`.

    #### Features Added

    - Added `RequestContent.Create(BinaryContent)` overload that adapts a `System.ClientModel.BinaryContent` instance into a `Azure.Core.RequestContent` instance.
    - Added experimental (`SCME0002`) `AzureCredentialResolver` that resolves Azure token credential sections (e.g. `AzureCliCredential`, `ManagedIdentityCredential`, `ChainedTokenCredential`) into `TokenCredential` instances. `ApiKeyCredential` sections are not claimed â€” clients dispatch on `Credential.CredentialSource` themselves.
    - Added experimental (`SCME0002`) extensions on `Azure.Identity.ConfigurationExtensions`:
    - `AddAzureCredentialResolver()` on `IServiceCollection` and `IHostApplicationBuilder` â€” idempotent DI registration.
    - `IConfiguration.GetAzureCredentialSettings(sectionName, ...)` â€” returns `CredentialSettings?` with `TokenProvider` populated for token sources and `Key` populated for inline ApiKey sources, so a single call site can dispatch on either shape without binding a `ClientSettings`.
    - `IConfiguration.GetAzureClientSettings<T>(sectionName, params CredentialResolver[] resolvers)` â€” resolver-aware overload.
    - The Azure OpenAI default-scope quirk now writes `Credential:Scope` at the credential-section root (the canonical SCM 1.12.0+ location) instead of `Credential:AdditionalProperties:Scope`. SCM 1.12.0 reads both locations so existing configs continue to work.
