- Name: azure-monitor-opentelemetry
  Version: 1.8.8
  DisplayName: Azure Monitor OpenTelemetry
  ServiceName: Monitor
  VersionType: Patch
  Hidden: false
  ChangelogUrl: https://github.com/Azure/azure-sdk-for-python/tree/azure-monitor-opentelemetry_1.8.8/sdk/monitor/azure-monitor-opentelemetry/CHANGELOG.md
  ChangelogContent: |-
    #### Features Added
    - Move `AZURE_MONITOR_DISTRO_VERSION` env var assignment before exporter imports
    ([#46869](https://github.com/Azure/azure-sdk-for-python/pull/46869))
    - Set `AZURE_MONITOR_DISTRO_VERSION` environment variable to pass distro version to the exporter
    ([#46666](https://github.com/Azure/azure-sdk-for-python/pull/46666))
    - Register GenAI main-agent attribution processors to automatically propagate
    `microsoft.gen_ai.main_agent.*` attributes in multi-agent GenAI systems per [spec](https://github.com/aep-health-and-standards/Telemetry-Collection-Spec/blob/main/ApplicationInsights/genai_main_agent_attribution.md)
    ([#46703](https://github.com/Azure/azure-sdk-for-python/pull/46703))

    #### Breaking Changes
    - Dropped support for Python 3.9. This package now supports Python 3.10+. [Follows upstream otel dropping support](https://github.com/open-telemetry/opentelemetry-python/pull/5076)
    ([#46695](https://github.com/Azure/azure-sdk-for-python/pull/46695))
- Name: azure-storage-file-datalake
  Version: 12.24.0
  DisplayName: Storage - Files Data Lake
  ServiceName: Storage
  VersionType: GA
  Hidden: false
  ChangelogUrl: https://github.com/Azure/azure-sdk-for-python/tree/azure-storage-file-datalake_12.24.0/sdk/storage/azure-storage-file-datalake/CHANGELOG.md
  ChangelogContent: |-
    #### Bugs Fixed
    - Fixed various issues with configuring logging via `logging_enable` and `logging_body` keywords on a per-request
    basis and with retries. Prior to this fix logging may have not behaved as expected, especially on retries.
    - Fix a potential memory leak caused by improper exception handling that could occur under rare circumstances.

    #### Features Added
    - Stable release of features from 12.24.0b1
