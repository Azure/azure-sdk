  ChangelogUrl: https://github.com/Azure/azure-sdk-for-net/tree/Azure.ResourceManager.ContainerServiceFleet_1.2.0-beta.3/sdk/fleet/Azure.ResourceManager.ContainerServiceFleet/CHANGELOG.md
