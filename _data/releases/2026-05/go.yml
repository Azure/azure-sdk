- Name: sdk/storage/azblob
  Version: 1.7.0-beta.1
  DisplayName: Storage - Blobs
  ServiceName: Storage
  VersionType: Beta
  Hidden: false
  ChangelogUrl: https://github.com/Azure/azure-sdk-for-go/tree/sdk/storage/azblob/v1.7.0-beta.1/sdk/storage/azblob/CHANGELOG.md
  ChangelogContent: |-
    #### Features Added
    * Added support for service version 2026-04-06.
    * Added support for Delete Blob Conditional Tier.
    * Added support for Server-side Encryption Rekeying.
    * Added cross-tenant support for Principal-Bound User Delegation SAS.
    * Added support for Dynamic User Delegation SAS.

    #### Bugs Fixed
    * Added support for error code `IncrementalCopyOfEarlierSnapshotNotAllowed`. This replaces `IncrementalCopyOfEralierVersionSnapshotNotAllowed` which has been deprecated.
    * Added support for missing SKU name values.
- Name: sdk/storage/azdatalake
  Version: 1.5.0-beta.1
  DisplayName: Storage - Files Data Lake
  ServiceName: Storage
  VersionType: Beta
  Hidden: false
  ChangelogUrl: https://github.com/Azure/azure-sdk-for-go/tree/sdk/storage/azdatalake/v1.5.0-beta.1/sdk/storage/azdatalake/CHANGELOG.md
  ChangelogContent: |-
    #### Features Added
    * Added support for service version 2026-04-06.
    * Added cross-tenant support for Principal-Bound User Delegation SAS.
    * Added support for Dynamic User Delegation SAS.
    * Added error code `PathIsTooDeep` which is returned when a path contains more than 63 path segments.

    #### Bugs Fixed
    * Added support for error code `IncrementalCopyOfEarlierSnapshotNotAllowed`. This replaces `IncrementalCopyOfEarlierVersionSnapshotNotAllowed` which has been deprecated.
