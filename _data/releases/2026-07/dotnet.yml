- Name: Azure.AI.AgentServer.Responses
  Version: 1.0.0-beta.6
  DisplayName: unknown
  ServiceName: unknown
  VersionType: Beta
  Hidden: false
  ChangelogUrl: https://github.com/Azure/azure-sdk-for-net/tree/Azure.AI.AgentServer.Responses_1.0.0-beta.6/sdk/agentserver/Azure.AI.AgentServer.Responses/CHANGELOG.md
  ChangelogContent: |-
    #### Breaking Changes
    - `ResponseContext.Isolation` is now `ResponseContext.PlatformContext` (type `PlatformContext` with `UserIdKey` / `CallId`).
    - `ResponsesProvider` methods now take a `PlatformContext context` parameter (previously `IsolationContext isolation`).
    - In-process partition enforcement is now keyed on the user ID (`x-agent-user-id`) instead of the chat isolation key.

    #### Features Added
    - Container protocol version `2.0.0` support: the per-request call ID (`x-agent-foundry-call-id`) and global user ID (`x-agent-user-id`) are read from inbound requests and exposed on `ResponseContext.PlatformContext`. The per-request call ID is forwarded on all outbound Foundry Storage calls; `x-agent-user-id` is used only for container-side partitioning and is not forwarded to 1P services.
- Name: Azure.Data.AppConfiguration
  Version: 1.10.0
  DisplayName: App Configuration
  ServiceName: App Configuration
  VersionType: GA
  Hidden: false
  ChangelogUrl: https://github.com/Azure/azure-sdk-for-net/tree/Azure.Data.AppConfiguration_1.10.0/sdk/appconfiguration/Azure.Data.AppConfiguration/CHANGELOG.md
  ChangelogContent: |-
    #### Features Added

    - Added a `Description` property on `ConfigurationSetting` and `ConfigurationSnapshot` to associate descriptive text with settings and snapshots.
    - Added `SettingFields.Description` so `Description` can be requested when retrieving configuration settings.
    - Added support for `2024-09-01` and `2026-04-01` (default) service API versions.
