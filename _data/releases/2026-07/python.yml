- Name: azure-mgmt-automation
  Version: 1.1.0b5
  DisplayName: Resource Management - Automation
  ServiceName: Automation
  VersionType: Beta
  Hidden: false
  ChangelogUrl: https://github.com/Azure/azure-sdk-for-python/tree/azure-mgmt-automation_1.1.0b5/sdk/automation/azure-mgmt-automation/CHANGELOG.md
