  ChangelogContent: |-
    #### Features Added

    - `Error` now captures a `std::backtrace::Backtrace` at construction time and includes it in `Debug` output (e.g., `{:?}`) when `RUST_BACKTRACE=1` is set.
- Name: azure_core_amqp
