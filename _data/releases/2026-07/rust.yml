- Name: azure_storage_blob
  Version: 1.1.0-beta.1
  DisplayName: Storage - Blobs
  ServiceName: Storage
  VersionType: Beta
  Hidden: false
  ChangelogUrl: https://github.com/Azure/azure-sdk-for-rust/tree/azure_storage_blob@1.1.0-beta.1/sdk/storage/azure_storage_blob/CHANGELOG.md
  ChangelogContent: |-
    #### Features Added

    - Added `BlobServiceClient::get_user_delegation_key()` to obtain a user delegation key for creating user delegation SAS tokens.
    - Added support for `list_blobs_hierarchical` to `BlobContainerClient`.
    - Added support for `list_page_ranges` to `PageBlobClient`.
    - Added support for `download_into` to `BlobClient` which enables downloads to write blob contents directly into a caller-provided buffer.
- Name: azure_storage_sas
  Version: 0.1.0
  DisplayName: Azure Storage SAS
  ServiceName: Storage SAS
  VersionType: Beta
  Hidden: false
  ChangelogUrl: https://github.com/Azure/azure-sdk-for-rust/tree/azure_storage_sas@0.1.0/sdk/storage/azure_storage_sas/CHANGELOG.md
  ChangelogContent: |-
    #### Features Added

    - Initial supported release.

