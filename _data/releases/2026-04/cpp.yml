entries:
- Name: azure-storage-files-shares
  Version: 12.18.0-beta.1
  DisplayName: Storage - Files Share
  ServiceName: Storage
  VersionType: Beta
  Hidden: false
  ChangelogUrl: https://github.com/Azure/azure-sdk-for-cpp/tree/azure-storage-files-shares_12.18.0-beta.1/sdk/storage/azure-storage-files-shares/CHANGELOG.md
  ChangelogContent: |-
    #### Features Added

    - Bumped up API version to `2026-06-06`.
    - Added support for creating files with data.
    - Added `FilePropertySemantics` option when creating files or directories.
- Name: azure-storage-common
  Version: 12.14.0-beta.1
  DisplayName: Storage - Common
  ServiceName: Storage
  VersionType: Beta
  Hidden: false
  ChangelogUrl: https://github.com/Azure/azure-sdk-for-cpp/tree/azure-storage-common_12.14.0-beta.1/sdk/storage/azure-storage-common/CHANGELOG.md
  ChangelogContent: |-
    #### Features Added

    - Bumped up Account SAS version to `2026-06-06`.
- Name: azure-storage-blobs
  Version: 12.18.0-beta.1
  DisplayName: Storage - Blobs
  ServiceName: Storage
  VersionType: Beta
  Hidden: false
  ChangelogUrl: https://github.com/Azure/azure-sdk-for-cpp/tree/azure-storage-blobs_12.18.0-beta.1/sdk/storage/azure-storage-blobs/CHANGELOG.md
  ChangelogContent: |-
    #### Features Added

    - Bumped up API version to `2026-06-06`.
    - Added support for directory-level SAS.
    - Added support for smart tier.
- Name: azure-storage-files-datalake
  Version: 12.16.0-beta.1
  DisplayName: Storage - Files Data Lake
  ServiceName: Storage
  VersionType: Beta
  Hidden: false
  ChangelogUrl: https://github.com/Azure/azure-sdk-for-cpp/tree/azure-storage-files-datalake_12.16.0-beta.1/sdk/storage/azure-storage-files-datalake/CHANGELOG.md
  ChangelogContent: |-
    #### Features Added

    - Bumped up API version to `2026-06-06`.
    - Added new APIs `DataLakePathClient::GetSystemProperties`, `DataLakePathClient::SetTags`, `DataLakePathClient::GetTags`.
    - Added `Tags` permission in DataLake SAS builder.

    #### Bugs Fixed

    - Fixed a bug where directory path is double-encoded when listing paths in it.
