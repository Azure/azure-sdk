- Name: Microsoft.Azure.WebJobs.Extensions.Storage.Blobs
  Version: 5.3.8
  DisplayName: Functions extension for Blob Storage
  ServiceName: Extensions
  VersionType: Patch
  Hidden: false
  ChangelogUrl: https://github.com/Azure/azure-sdk-for-net/tree/Microsoft.Azure.WebJobs.Extensions.Storage.Blobs_5.3.8/sdk/storage/Microsoft.Azure.WebJobs.Extensions.Storage.Blobs/CHANGELOG.md
  ChangelogContent: |-
    #### Bugs Fixed
    - Fixed a bug where polling for new blobs could permanently miss blobs that were created or modified while a multi-request blob listing scan was in progress (#51030).
    - Bug fix ensuring that BlobTrigger log scan targets the correct storage account in multi-account scenarios.
