entries:
- Name: azure_storage_blob
  Version: 0.10.1
  DisplayName: Storage - Blobs
  ServiceName: Storage
  VersionType: Beta
  Hidden: false
  ChangelogUrl: https://github.com/Azure/azure-sdk-for-rust/tree/azure_storage_blob@0.10.1/sdk/storage/azure_storage_blob/CHANGELOG.md
  ChangelogContent: |-
    #### Bugs Fixed

    - `BlobClient::managed_download()` and `BlobClientManagedDownloadOptions` were unintentionally exported in 0.10.0. The method now panics unconditionally; this API will be removed in a future release.
    - Updated minimum dependency versions to incorporate a fix for TLS 1.3 data corruption on Windows when uploading large payloads ([schannel-rs#121](https://github.com/steffengy/schannel-rs/pull/121)).
- Name: typespec_client_core
  Version: 0.13.0
  DisplayName: TypeSpec Client Core
  ServiceName: TypeSpec
  VersionType: Beta
  Hidden: false
  ChangelogUrl: https://github.com/Azure/azure-sdk-for-rust/tree/typespec_client_core@0.13.0/sdk/core/typespec_client_core/CHANGELOG.md
  ChangelogContent: |-
    #### Features Added

    - Added `From<BytesStream> for Body`.

    #### Breaking Changes

    - `SeekableStream::len()` and `Body::len()` now return `Option<u64>` instead of `usize` to support streams with unknown length and to align with `std::fs::Metadata::len()` for large file sizes.
    - `SeekableStream::is_empty()` and `Body::is_empty()` now return `Option<bool>`.
    - Added `tokio` feature to `default` features.
    - Changed `async_runtime::spawn` to return a `SpawnedTask` trait (supports `abort()`) instead of a raw future.
